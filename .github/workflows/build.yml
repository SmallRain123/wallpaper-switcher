# Wallpaper Switcher - GitHub Actions Build
# Builds Windows .exe via PyInstaller, auto-publishes Release on tag push.

name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --name "WallpaperSwitcher" `
            --onefile `
            --windowed `
            --icon "icon.ico" `
            --clean `
            --add-data "static;static" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import webview `
            --hidden-import webview.platforms.winforms `
            --hidden-import clr `
            --hidden-import pythonnet `
            --collect-all webview `
            --collect-all pythonnet `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            --hidden-import PIL.ImageFont `
            --collect-all pystray `
            --collect-all PIL `
            app.py

      - name: Rename executable with version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv dist/WallpaperSwitcher.exe "dist/WallpaperSwitcher-${VERSION}.exe"

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum WallpaperSwitcher-*.exe > checksums.txt
          cat checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperSwitcher-${{ steps.version.outputs.version }}
          path: |
            dist/WallpaperSwitcher-*.exe
            dist/checksums.txt
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Wallpaper Switcher ${{ github.ref_name }}"
          body: |
            ## 🎉 下载

            **便携版**：下载 `WallpaperSwitcher-${{ github.ref_name }}.exe`，双击即用，无需安装。

            ## ✨ 功能
            - 📁 本地图片 — 选择本地图片文件直接设为壁纸
            - 🔗 URL 直链 — 输入图片直链，自动下载并应用
            - 🐙 GitHub 仓库 — 输入仓库地址，浏览目录树选择图片
            - 🕐 历史记录 — 缩略图预览历史壁纸，支持一键恢复/删除

            ## 📋 校验和
            ```
            $(cat dist/checksums.txt)
            ```

            ---

            ${{ github.event.head_commit.message }}
          files: |
            dist/WallpaperSwitcher-*.exe
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
